# /etc/keyd/default.conf

[ids]
*

[main]
# 单独按下 = 切换 CapsLock；按住 = 激活 caps 层
capslock = overload(caps, capslock)

[caps]
# ── 基础方向 ──────────────────────────────
e = up
d = down
s = left
f = right
p = home
semicolon = end

# ── 词间跳转 ──────────────────────────────
u = C-left
o = C-right

# vscode 前进后退
j = C-left
l = C-right

# ── 移动行 ──────────────────────────────
i = A-up
k = A-down

# ── 功能键映射 ────────────────────────────
1 = f12
2 = f1
4 = f3
3 = M-f

# ── 宏：删除当前行 ────────────────────────
backspace = macro(end S-C-k up end)

# ── 宏：剪切当前行 ────────────────────────
n = macro(end S-home C-x)